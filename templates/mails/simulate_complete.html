<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      .container {
        width: 50vw;
        color: #2f3b4d;
        margin: auto;
        
        margin-top: 25px;
        border-top: 1px solid #bbbbbb;
      }
      .title {
        font-size: x-large;
        color: #2f3b4d;
      }
      .text-info {
        color: #9ba3b6;
      }
      body {
        font-family: "Outfit", sans-serif;
      }

      .btn {
        width: 100%;
        display: flex;
        align-items: center;
        height: 50px;
        justify-content: center;
        background-color: #1c2536;
        border: none;
        border-radius: 5px;
        font-size: 20px;
        color: white !important;
        margin: auto;
      }
      .btn-text {
        display: grid;
        color: white !important;
        width: 100%;
        justify-content: center;
        font-size: 20px;
        font-weight: 400;
        text-align: center;
        margin: auto;
        text-decoration: none !important;
      }
      .btn:hover {
        cursor: pointer;
      }
      @media only screen and (max-width: 600px) {
        .container {
          width: 100vw;
          margin: auto;
        }
        .container-btn {
          justify-content: center;
        }
        .btn {
          margin: auto;
          width: 60vw;
          text-align: center;
        }
      }
    </style>
    <title>
        Tracker - Simulacion de salida {{ id }}
    </title>
  </head>
  <body>
    <div class="container">
      <div class="container-title">
        <p>
          Hola <b> {{ name }}, </b> <br />
          Le informamos que se ha completado con exito el proceso de simulacion de la salida <b> {{ id }} </b> en
          <b>Plataforma de Tracker. </b>
        </p>
      </div>
      <div class="container-btn">
        <p>
          Puede ingresar a la plataforma haciendo click en el siguiente boton:
        </p>
      </div>

      <p >
        Este correo es generado automaticamente, por favor no responda a este correo.
      </p>
    </div>
  </body>
</html>
