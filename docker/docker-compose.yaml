version: '3.3'
services:
  db:
    container_name: postgres
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
        - "5432:5432"
    volumes:
        - ../../data_pg:/var/lib/postgresql/data/

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DB_HOST=db
    depends_on:
      - db
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ../../data_redis:/data
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A config beat
    volumes:
      - ..:/app
    env_file:
      - ../.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ..:/app
    env_file:
      - ../.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
